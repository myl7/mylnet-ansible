---
- name: Harden hosts
  hosts: hosts
  become: true

  vars:
    unwanted_services:
      - ModemManager.service # Unused
      - wpa_supplicant.service # Unused
      - netfilter-persistent.service # Redundant with nftables

  vars_files:
    - secrets.yaml

  pre_tasks:
    - name: Default rkhunter whitelist
      ansible.builtin.set_fact:
        rkhunter_allowed_hidden_files: []
      when: rkhunter_allowed_hidden_files is undefined

    - name: Check SMTP config
      ansible.builtin.assert:
        that:
          - system_smtp_host is defined
          - system_smtp_port is defined
          - system_smtp_username is defined
          - system_smtp_password is defined
          - system_smtp_from is defined
          - system_smtp_to is defined
        fail_msg: "Set system_smtp_host, system_smtp_port, system_smtp_username, system_smtp_password, system_smtp_from, system_smtp_to in secrets.yaml"
        quiet: true

  tasks:
    - name: Install security packages
      ansible.builtin.apt:
        name:
          - msmtp-mta # Provides sendmail-compatible outbound SMTP for system mails
          - unattended-upgrades # lynis PKGS-7420: Apply package upgrades automatically
          - libpam-pwquality # lynis AUTH-9262: Enforce password strength
          - apt-show-versions # lynis PKGS-7394: Show package update status
          - debsums # lynis PKGS-7370: Verify package file checksums
          - debsecan # lynis PKGS-7398: Detect vulnerable packages
          - sysstat # lynis ACCT-9626: Collect system activity history (`sar`)
          - auditd # lynis ACCT-9628: Audit high-signal security file changes
          - rkhunter # lynis HRDN-7230: Scan for rootkits and suspicious files
        state: present

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Disable unwanted services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop: "{{ unwanted_services }}"
      when: item in ansible_facts.services

    # lynis KRNL-5820
    - name: Disable core dumps
      ansible.builtin.copy:
        content: |
          * hard core 0
          * soft core 0
        dest: /etc/security/limits.d/10-disable-coredumps.conf
        owner: root
        group: root
        mode: "0644"

    # lynis USB-1000
    - name: Blacklist USB storage driver
      ansible.builtin.copy:
        content: "install usb-storage /bin/true\n"
        dest: /etc/modprobe.d/usb-storage.conf
        owner: root
        group: root
        mode: "0644"
      register: modprobe_usb_config

    # lynis STRG-1846
    - name: Blacklist FireWire drivers
      ansible.builtin.copy:
        content: |
          install firewire-core /bin/true
          install firewire-ohci /bin/true
          install firewire-sbp2 /bin/true
        dest: /etc/modprobe.d/firewire.conf
        owner: root
        group: root
        mode: "0644"
      register: modprobe_firewire_config

    # lynis NETW-3200
    - name: Blacklist unused network protocols
      ansible.builtin.copy:
        content: |
          install dccp /bin/true
          install sctp /bin/true
          install rds /bin/true
          install tipc /bin/true
        dest: /etc/modprobe.d/netprotocols.conf
        owner: root
        group: root
        mode: "0644"
      register: modprobe_unused_net_proto_config

    # lynis PKGS-7420: Apply package upgrades automatically
    - name: Enable periodic apt update and upgrade
      ansible.builtin.copy:
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"

    - name: Unmask apt-daily services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        masked: false
      loop:
        - apt-daily.service
        - apt-daily-upgrade.service

    - name: Unmask and enable apt-daily timers
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        masked: false
        enabled: true
        state: started
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer

    - name: Configure msmtp
      ansible.builtin.template:
        src: msmtp/msmtprc.j2
        dest: /etc/msmtprc
        owner: root
        group: root
        mode: "0600" # Required by msmtp

    - name: Route local system mail to system_smtp_to
      ansible.builtin.copy:
        content: |
          root: {{ system_smtp_to }}
          default: {{ system_smtp_to }}
        dest: /etc/aliases
        owner: root
        group: root
        mode: "0644"

    # lynis PKGS-7370: Verify package file checksums
    - name: Configure debsums cron
      ansible.builtin.copy:
        content: "CRON_CHECK=monthly\n"
        dest: /etc/default/debsums
        owner: root
        group: root
        mode: "0644"

    # lynis PKGS-7398: Detect vulnerable packages
    - name: Configure debsecan
      ansible.builtin.copy:
        content: |
          REPORT=true
          MAILTO=root
          SUITE={{ ansible_facts.distribution_release | quote }}
          SOURCE=
          SUBJECT='Debian security status of %s(hostname)s'
          DISABLE_HTTPS_CHECK=false
        dest: /etc/default/debsecan
        owner: root
        group: root
        mode: "0644"

    - name: Schedule debsecan
      ansible.builtin.cron:
        name: Run debsecan
        cron_file: debsecan
        user: daemon
        minute: "17"
        hour: "6"
        job: /usr/bin/debsecan --cron

    - name: Create local security state directory
      ansible.builtin.file:
        path: /var/lib/mylnet-security
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check auditd is installed
      ansible.builtin.stat:
        path: /usr/sbin/auditd
      register: auditd_bin
      changed_when: false

    # Some VPS kernels ship without CONFIG_AUDIT, so auditctl and augenrules
    # cannot reach the netlink audit socket. Skip the auditd subsystem there.
    - name: Probe kernel audit support
      ansible.builtin.command:
        cmd: auditctl -s
      register: audit_probe
      changed_when: false
      failed_when: false
      check_mode: false
      when: auditd_bin.stat.exists

    - name: Set audit support fact
      ansible.builtin.set_fact:
        audit_supported: "{{ auditd_bin.stat.exists and (audit_probe.rc | default(1)) == 0 }}"

    # lynis ACCT-9628: Audit security-sensitive file changes
    - name: Install auditd watch rules
      ansible.builtin.copy:
        src: auditd/hardening.rules
        dest: /etc/audit/rules.d/99-mylnet-hardening.rules
        owner: root
        group: root
        mode: "0640"
      notify: Load auditd rules
      when: audit_supported

    - name: Start and enable auditd
      ansible.builtin.systemd_service:
        name: auditd
        enabled: true
        state: started
      when: audit_supported

    - name: Disable auditd without kernel audit support
      ansible.builtin.systemd_service:
        name: auditd
        enabled: false
        state: stopped
      when: auditd_bin.stat.exists and not audit_supported

    - name: Install auditd watch report script
      ansible.builtin.copy:
        src: sbin/auditd-watch-report
        dest: /usr/local/sbin/mylnet-auditd-watch-report
        owner: root
        group: root
        mode: "0755"
      when: audit_supported

    - name: Prime auditd watch report checkpoint
      ansible.builtin.command:
        cmd: /usr/local/sbin/mylnet-auditd-watch-report
      changed_when: false
      when: audit_supported

    - name: Schedule auditd watch reports
      ansible.builtin.cron:
        name: Report auditd watched-file events
        cron_file: mylnet-auditd-watch
        user: root
        minute: "*/15"
        job: /usr/local/sbin/mylnet-auditd-watch-report
      when: audit_supported

    # lynis HRDN-7230: Scan for rootkits and suspicious files
    - name: Configure rkhunter cron
      ansible.builtin.copy:
        content: |
          CRON_DAILY_RUN="true"
          CRON_DB_UPDATE="true"
          DB_UPDATE_EMAIL="false"
          REPORT_EMAIL="root"
          APT_AUTOGEN="true"
          NICE="0"
          RUN_CHECK_ON_BATTERY="false"
        dest: /etc/default/rkhunter
        owner: root
        group: root
        mode: "0644"

    - name: Whitelist known-good rkhunter findings
      ansible.builtin.copy:
        # /etc/.updated: systemd writes it after a successful system update
        content: |
          ALLOWHIDDENFILE=/etc/.updated
          {% for path in rkhunter_allowed_hidden_files %}
          ALLOWHIDDENFILE={{ path }}
          {% endfor %}
        dest: /etc/rkhunter.conf.local
        owner: root
        group: root
        mode: "0644"

    - name: Initialize rkhunter property database
      ansible.builtin.command:
        cmd: rkhunter --propupd
      args:
        creates: /var/lib/rkhunter/db/rkhunter.dat

    # lynis AUTH-9228: Check passwd and shadow consistency
    - name: Install pwck report script
      ansible.builtin.copy:
        src: sbin/pwck-report
        dest: /usr/local/sbin/mylnet-pwck-report
        owner: root
        group: root
        mode: "0755"

    - name: Schedule pwck reports
      ansible.builtin.cron:
        name: Report passwd and shadow consistency issues
        cron_file: mylnet-pwck
        user: root
        minute: "37"
        hour: "5"
        day: "1"
        job: /usr/local/sbin/mylnet-pwck-report

    - name: Check sysstat is installed
      ansible.builtin.stat:
        path: /etc/default/sysstat
      register: sysstat_default
      changed_when: false

    # lynis ACCT-9626
    - name: Enable sysstat collection
      ansible.builtin.lineinfile:
        path: /etc/default/sysstat
        regexp: "^ENABLED="
        line: 'ENABLED="true"'
      when: sysstat_default.stat.exists

    # lynis ACCT-9626
    - name: Start and enable sysstat timers
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - sysstat-collect.timer
        - sysstat-summary.timer
      when: sysstat_default.stat.exists

    - name: Create journald drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Persist and cap systemd journal
      ansible.builtin.copy:
        content: |
          [Journal]
          Storage=persistent
          SystemMaxUse=200M
          SystemMaxFileSize=25M
          MaxRetentionSec=1month
        dest: /etc/systemd/journald.conf.d/persist.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart journald

  post_tasks:
    - name: Show reboot notice
      ansible.builtin.debug:
        msg: "Reboot the host after applying this play because kernel module config changed."
      when: >-
        modprobe_usb_config.changed
        or modprobe_firewire_config.changed
        or modprobe_unused_net_proto_config.changed

  handlers:
    - name: Load auditd rules
      ansible.builtin.command:
        cmd: augenrules --load
      changed_when: true
      when: audit_supported

    - name: Restart journald
      ansible.builtin.systemd_service:
        name: systemd-journald
        state: restarted
