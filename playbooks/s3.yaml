---
- name: Deploy S3
  hosts: sg

  vars_files:
    - secrets.yaml

  vars:
    rustfs_api_local_port: 50006
    rustfs_console_local_port: 50007
    stack_dir: /opt/stacks/s3

  pre_tasks:
    - name: Check s3 domain and TLS config
      ansible.builtin.assert:
        that:
          - s3_domain is defined
          - s3_console_domain is defined
          - s3_cert is defined
          - s3_key is defined
          - s3_console_cert is defined
          - s3_console_key is defined
        fail_msg: "Set s3_domain, s3_console_domain, s3_cert, s3_key, s3_console_cert, and s3_console_key"
        quiet: true

    - name: Check rustfs_access_key and rustfs_secret_key
      ansible.builtin.assert:
        that:
          - rustfs_access_key is defined
          - rustfs_secret_key is defined
          - rustfs_access_key | trim | length > 0
          - rustfs_secret_key | trim | length > 0
        fail_msg: "Set rustfs_access_key and rustfs_secret_key in secrets.yaml"
        quiet: true

  tasks:
    - name: Create stack dir
      ansible.builtin.file:
        path: "{{ stack_dir }}"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0755"

    - name: Create RustFS data dir
      become: true
      ansible.builtin.file:
        path: /srv/share/s3
        state: directory
        # /srv/share is a CIFS mount configured with noperm, so use a broad mode here.
        mode: "0777"

    - name: Render compose file
      ansible.builtin.template:
        src: s3/compose.yaml.j2
        dest: "{{ stack_dir }}/compose.yaml"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0644"
      notify: Recreate containers

    - name: Check stack dir exists
      ansible.builtin.stat:
        path: "{{ stack_dir }}"
      register: stack_dir_stat
      changed_when: false

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: "{{ stack_dir }}"
        state: present
        remove_orphans: true
        pull: always
      when: stack_dir_stat.stat.exists

    - name: Render nginx site
      become: true
      ansible.builtin.template:
        src: s3/s3.nginx.j2
        dest: /etc/nginx/sites-available/s3
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Check nginx site exists
      become: true
      ansible.builtin.stat:
        path: /etc/nginx/sites-available/s3
      register: s3_site
      changed_when: false

    - name: Enable nginx site
      become: true
      ansible.builtin.file:
        src: /etc/nginx/sites-available/s3
        dest: /etc/nginx/sites-enabled/s3
        state: link
      when: s3_site.stat.exists
      notify: Reload nginx

  handlers:
    - name: Import docker handlers
      ansible.builtin.import_tasks: tasks/docker_handlers.yaml

    - name: Import nginx handlers
      ansible.builtin.import_tasks: tasks/nginx_handlers.yaml
