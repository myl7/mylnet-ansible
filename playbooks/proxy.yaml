---
- name: Deploy proxy
  hosts: proxy

  vars_files:
    - secrets.yaml

  vars:
    stack_dir: /opt/stacks/proxy
    proxy_ss_password: "{{ proxy_ss_passwords.get(inventory_hostname, '') }}"
    proxy_nft_rules:
      - 'add rule inet filter input_ipv4 tcp dport 8388 accept comment "ANSIBLE MANAGED RULE"'
      - 'add rule inet filter input_ipv4 udp dport 8388 accept comment "ANSIBLE MANAGED RULE"'

  pre_tasks:
    - name: Default proxy_ss_passwords
      ansible.builtin.set_fact:
        proxy_ss_passwords: {}
      when: proxy_ss_passwords is undefined

    - name: Check proxy_ss_password
      ansible.builtin.assert:
        that:
          - proxy_ss_password | trim | length > 0
        fail_msg: 'Set proxy_ss_passwords["{{ inventory_hostname }}"] in secrets.yaml'
        quiet: true

  tasks:
    - name: Install nftables rules
      become: true
      ansible.builtin.copy:
        content: |
          #!/usr/sbin/nft -f

          {% for proxy_nft_rule in proxy_nft_rules %}
          {{ proxy_nft_rule }}
          {% endfor %}
        dest: /etc/nftables.d/proxy.nft
        owner: root
        group: root
        mode: "0644"

    - name: Apply nftables rules
      become: true
      ansible.builtin.script:
        cmd: >-
          ../scripts/ensure_nft.py
          {{ (ansible_check_mode | default(false)) | ternary('--check', '') }}
          --
          {{ item }}
      register: proxy_nft_apply
      changed_when: "'changed=true' in proxy_nft_apply.stdout_lines"
      check_mode: false
      loop: "{{ proxy_nft_rules }}"

    - name: Create stack dir
      ansible.builtin.file:
        path: "{{ stack_dir }}"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0755"

    - name: Render config
      ansible.builtin.template:
        src: proxy/config.yaml.j2
        dest: "{{ stack_dir }}/config.yaml"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0600"
      notify: Recreate containers

    - name: Copy compose file
      ansible.builtin.copy:
        src: proxy/compose.yaml
        dest: "{{ stack_dir }}/compose.yaml"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0644"
      notify: Recreate containers

    - name: Check stack dir exists
      ansible.builtin.stat:
        path: "{{ stack_dir }}"
      register: stack_dir_stat
      changed_when: false

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: "{{ stack_dir }}"
        state: present
        remove_orphans: true
        pull: always
      when: stack_dir_stat.stat.exists

  handlers:
    - name: Import docker handlers
      ansible.builtin.import_tasks: handlers/docker.yaml

- name: Serve proxy subscription
  hosts: sg
  become: true

  vars_files:
    - secrets.yaml

  vars:
    proxy_hostnames: "{{ groups.get('proxy', []) | sort }}"
    proxy_hosts: >-
      {{
        dict(proxy_hostnames | zip(
          proxy_hostnames | map('extract', hostvars, 'ansible_host')
        ))
      }}
    proxy_ai_hostname: sg
    proxy_proxy_hostname: sg

  pre_tasks:
    - name: Default proxy_ss_passwords
      ansible.builtin.set_fact:
        proxy_ss_passwords: {}
      when: proxy_ss_passwords is undefined

    - name: Check proxy_ai_hostname and proxy_proxy_hostname
      ansible.builtin.assert:
        that:
          - proxy_ai_hostname in proxy_hostnames
          - proxy_proxy_hostname in proxy_hostnames
        fail_msg: "Set proxy_ai_hostname and proxy_proxy_hostname to hosts in the proxy group"
        quiet: true

    - name: Check proxy_sub_domain, proxy_sub_cert, and proxy_sub_key
      ansible.builtin.assert:
        that:
          - proxy_sub_domain is defined
          - proxy_sub_cert is defined
          - proxy_sub_key is defined
        fail_msg: "Set proxy_sub_domain, proxy_sub_cert and proxy_sub_key"
        quiet: true

    - name: Check proxy_sub_id
      ansible.builtin.assert:
        that:
          - proxy_sub_id is defined
        fail_msg: "Set proxy_sub_id in secrets.yaml"
        quiet: true

    - name: Check ansible_host for each proxy host
      ansible.builtin.assert:
        that:
          - hostvars[item].ansible_host | default('') | string | trim | length > 0
        fail_msg: "Set ansible_host for proxy host {{ item }}"
        quiet: true
      loop: "{{ proxy_hostnames }}"

    - name: Check proxy_ss_passwords for each proxy host
      ansible.builtin.assert:
        that:
          - proxy_ss_passwords[item] is defined
        fail_msg: 'Set proxy_ss_passwords["{{ item }}"] in secrets.yaml'
        quiet: true
      loop: "{{ proxy_hostnames }}"

  tasks:
    - name: Create subscription root
      ansible.builtin.file:
        path: /var/www/proxy-sub
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render subscription content
      ansible.builtin.template:
        src: proxy/clash.yaml.j2
        dest: /var/www/proxy-sub/clash.yaml
        owner: root
        group: root
        mode: "0644"

    - name: Render subscription nginx site
      ansible.builtin.template:
        src: proxy/proxy-sub.nginx.j2
        dest: /etc/nginx/sites-available/proxy-sub
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Check subscription nginx site exists
      ansible.builtin.stat:
        path: /etc/nginx/sites-available/proxy-sub
      register: proxy_sub_site
      changed_when: false

    - name: Enable subscription nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/proxy-sub
        dest: /etc/nginx/sites-enabled/proxy-sub
        state: link
      when: proxy_sub_site.stat.exists
      notify: Reload nginx

  handlers:
    - name: Import nginx handlers
      ansible.builtin.import_tasks: handlers/nginx.yaml
