# Already-initialized hosts can still run this playbook, but without side_effect plays.
---
# Assume SSH and apt.
# Assume python3 in apt fits Ansible.
- name: Init newly-created hosts
  hosts: raw, hosts
  gather_facts: false
  become: true

  vars:
    unwanted_services:
      - ModemManager.service # Unused
      - wpa_supplicant.service # Unused
      - netfilter-persistent.service # Redundant with nftables

  vars_files:
    - ../secrets.yaml

  pre_tasks:
    - name: Check password_hash
      ansible.builtin.assert:
        that:
          - password_hash is defined
        fail_msg: "Set password_hash in secrets.yaml"
        quiet: true

    - name: Check SMTP config
      ansible.builtin.assert:
        that:
          - system_smtp_host is defined
          - system_smtp_port is defined
          - system_smtp_username is defined
          - system_smtp_password is defined
          - system_smtp_from is defined
          - system_smtp_to is defined
        fail_msg: "Set system_smtp_host, system_smtp_port, system_smtp_username, system_smtp_password, system_smtp_from, system_smtp_to in secrets.yaml"
        quiet: true

  tasks:
    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          echo "python3 present"
        else
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt
          echo "python3 installed"
        fi
      register: bootstrap_python
      changed_when: "'python3 installed' in bootstrap_python.stdout"

    - name: Gather facts
      ansible.builtin.setup:

    - name: Upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: "yes"

    - name: Install basic packages
      ansible.builtin.apt:
        name:
          - python3
          - sudo
          - build-essential
          - bash
          - neovim
          - git
          - nftables
          - htop
          - net-tools
          - dnsutils
          - ncdu
          - curl
          - wget
          - rsync
          - ca-certificates
          - cron
          - python3-debian # For deb822_repository module
          - msmtp-mta # Provides sendmail-compatible outbound SMTP for system mails
          - unattended-upgrades # lynis PKGS-7420: Apply package upgrades automatically
          - libpam-pwquality # lynis AUTH-9262: Enforce password strength
          - apt-show-versions # lynis PKGS-7394: Show package update status
          - debsums # lynis PKGS-7370: Verify package file checksums
          - debsecan # lynis PKGS-7398: Detect vulnerable packages
          - sysstat # lynis ACCT-9626: Collect system activity history (`sar`)
          - auditd # lynis ACCT-9628: Audit high-signal security file changes
          - rkhunter # lynis HRDN-7230: Scan for rootkits and suspicious files
        state: present

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname_short }}"

    - name: Update hosts for hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^(127\.0\.1\.1|{{ ansible_host | regex_escape }})\s+'
        line: "{{ ansible_host }} {{ inventory_hostname_short }}"

    - name: Update SSH config
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        insertbefore: BOF
        block: |
          PermitRootLogin no
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          Port 50000
          UseDNS no
        validate: /usr/sbin/sshd -t -f %s
      register: ssh_config

    - name: Comment default SSH port
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^\s*(Port 22.*)$'
        line: '# \1'
        backrefs: true
        validate: /usr/sbin/sshd -t -f %s
      register: ssh_comment_default_port

    - name: Start and enable nftables
      ansible.builtin.systemd_service:
        name: nftables
        state: started
        enabled: true

    - name: Create nftables drop-in directory
      ansible.builtin.file:
        path: /etc/nftables.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Setup nftables
      ansible.builtin.copy:
        src: nftables.conf
        dest: /etc/nftables.conf
        owner: root
        group: root
        mode: "0644"
        validate: /usr/sbin/nft --check --file %s
      register: nftables_config

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Disable unwanted services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop: "{{ unwanted_services }}"
      when: item in ansible_facts.services

    - name: Add user
      ansible.builtin.user:
        name: "{{ username }}"
        state: present
        shell: /bin/bash
        create_home: true
        groups: sudo
        append: true
        password: "{{ password_hash }}"
        update_password: on_create

    - name: Check user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ username }}"
        fail_key: false
      changed_when: false

    - name: Allow user to run passwordless sudo
      ansible.builtin.copy:
        content: "{{ username }} ALL=(ALL:ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ username }}"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s

    - name: Setup user SSH
      ansible.posix.authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ lookup('ansible.builtin.file', '../secrets/ssh/id_ed25519.pub') }}"
      when: ansible_facts.getent_passwd[username] is not none

    # lynis HOME-9304
    - name: Restrict user home
      ansible.builtin.file:
        path: "/home/{{ username }}"
        state: directory
        mode: "0700"

    # lynis KRNL-5820
    - name: Disable core dumps
      ansible.builtin.copy:
        content: |
          * hard core 0
          * soft core 0
        dest: /etc/security/limits.d/10-disable-coredumps.conf
        owner: root
        group: root
        mode: "0644"

    # lynis USB-1000
    - name: Blacklist USB storage driver
      ansible.builtin.copy:
        content: "install usb-storage /bin/true\n"
        dest: /etc/modprobe.d/usb-storage.conf
        owner: root
        group: root
        mode: "0644"
      register: modprobe_usb_config

    # lynis STRG-1846
    - name: Blacklist FireWire drivers
      ansible.builtin.copy:
        content: |
          install firewire-core /bin/true
          install firewire-ohci /bin/true
          install firewire-sbp2 /bin/true
        dest: /etc/modprobe.d/firewire.conf
        owner: root
        group: root
        mode: "0644"
      register: modprobe_firewire_config

    # lynis NETW-3200
    - name: Blacklist unused network protocols
      ansible.builtin.copy:
        content: |
          install dccp /bin/true
          install sctp /bin/true
          install rds /bin/true
          install tipc /bin/true
        dest: /etc/modprobe.d/netprotocols.conf
        owner: root
        group: root
        mode: "0644"
      register: modprobe_unused_net_proto_config

    # lynis PKGS-7420: Apply package upgrades automatically
    - name: Enable periodic apt update and upgrade
      ansible.builtin.copy:
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"

    # lynis PKGS-7420
    - name: Unmask and enable apt-daily timers
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        masked: false
        enabled: true
        state: started
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer

    - name: Configure msmtp
      ansible.builtin.template:
        src: msmtp/msmtprc.j2
        dest: /etc/msmtprc
        owner: root
        group: root
        mode: "0600" # Required by msmtp

    - name: Route local system mail to system_smtp_to
      ansible.builtin.copy:
        content: |
          root: {{ system_smtp_to }}
          default: {{ system_smtp_to }}
        dest: /etc/aliases
        owner: root
        group: root
        mode: "0644"

    # lynis PKGS-7370: Verify package file checksums
    - name: Configure debsums cron
      ansible.builtin.copy:
        content: "CRON_CHECK=monthly\n"
        dest: /etc/default/debsums
        owner: root
        group: root
        mode: "0644"

    # lynis PKGS-7398: Detect vulnerable packages
    - name: Configure debsecan
      ansible.builtin.copy:
        content: |
          REPORT=true
          MAILTO=root
          SUITE={{ ansible_facts.distribution_release | quote }}
          SOURCE=
          SUBJECT='Debian security status of %s(hostname)s'
          DISABLE_HTTPS_CHECK=false
        dest: /etc/default/debsecan
        owner: root
        group: root
        mode: "0644"

    - name: Schedule debsecan
      ansible.builtin.cron:
        name: Run debsecan
        cron_file: debsecan
        user: daemon
        minute: "17"
        hour: "6"
        job: /usr/bin/debsecan --cron

    - name: Create local security state directory
      ansible.builtin.file:
        path: /var/lib/mylnet-security
        state: directory
        owner: root
        group: root
        mode: "0755"

    # lynis ACCT-9628: Audit security-sensitive file changes
    - name: Install auditd watch rules
      ansible.builtin.copy:
        src: auditd/hardening.rules
        dest: /etc/auditd/rules.d/99-mylnet-hardening.rules
        owner: root
        group: root
        mode: "0640"
      notify: Load auditd rules

    - name: Start and enable auditd
      ansible.builtin.systemd_service:
        name: auditd
        enabled: true
        state: started

    - name: Install auditd watch report script
      ansible.builtin.copy:
        src: security/auditd-watch-report
        dest: /usr/local/sbin/mylnet-auditd-watch-report
        owner: root
        group: root
        mode: "0755"

    - name: Prime auditd watch report checkpoint
      ansible.builtin.command:
        cmd: /usr/local/sbin/mylnet-auditd-watch-report
      changed_when: false

    - name: Schedule auditd watch reports
      ansible.builtin.cron:
        name: Report auditd watched-file events
        cron_file: mylnet-auditd-watch
        user: root
        minute: "*/15"
        job: /usr/local/sbin/mylnet-auditd-watch-report

    # lynis HRDN-7230: Scan for rootkits and suspicious files
    - name: Configure rkhunter cron
      ansible.builtin.copy:
        content: |
          CRON_DAILY_RUN="true"
          CRON_DB_UPDATE="true"
          DB_UPDATE_EMAIL="false"
          REPORT_EMAIL="root"
          APT_AUTOGEN="true"
          NICE="0"
          RUN_CHECK_ON_BATTERY="false"
        dest: /etc/default/rkhunter
        owner: root
        group: root
        mode: "0644"

    - name: Initialize rkhunter property database
      ansible.builtin.shell: |
        rkhunter --propupd
        touch /var/lib/mylnet-security/rkhunter-propupd.done
      args:
        creates: /var/lib/mylnet-security/rkhunter-propupd.done

    # lynis AUTH-9228: Check passwd and shadow consistency
    - name: Install pwck report script
      ansible.builtin.copy:
        src: security/pwck-report
        dest: /usr/local/sbin/mylnet-pwck-report
        owner: root
        group: root
        mode: "0755"

    - name: Schedule pwck reports
      ansible.builtin.cron:
        name: Report passwd and shadow consistency issues
        cron_file: mylnet-pwck
        user: root
        minute: "37"
        hour: "5"
        day: "1"
        job: /usr/local/sbin/mylnet-pwck-report

    # lynis ACCT-9626
    - name: Enable sysstat collection
      ansible.builtin.lineinfile:
        path: /etc/default/sysstat
        regexp: "^ENABLED="
        line: 'ENABLED="true"'

    # lynis ACCT-9626
    - name: Start and enable sysstat timers
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - sysstat-collect.timer
        - sysstat-summary.timer

    - name: Create journald drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Persist and cap systemd journal
      ansible.builtin.copy:
        content: |
          [Journal]
          Storage=persistent
          SystemMaxUse=200M
          SystemMaxFileSize=25M
          MaxRetentionSec=1month
        dest: /etc/systemd/journald.conf.d/persist.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart journald

  post_tasks:
    - name: Show SSH and nftables reload notice
      ansible.builtin.debug:
        msg: "SSH or nftables changed. Run the side-effect play with `--tags side_effect` after checking access so you do not lock yourself out of the server."
      when: >-
        ssh_config.changed
        or ssh_comment_default_port.changed
        or nftables_config.changed

    - name: Show nftables service rules notice
      ansible.builtin.debug:
        msg: "To reload nftables, handle rules added by existing services, e.g., Docker or Tailscale, with, e.g., restarting."
      when: >-
        'raw' not in group_names
        and nftables_config.changed

    - name: Show reboot notice
      ansible.builtin.debug:
        msg: "Reboot the host after applying this play because it is newly initialized or kernel module config changed."
      when: >-
        'raw' in group_names
        or modprobe_usb_config.changed
        or modprobe_firewire_config.changed
        or modprobe_unused_net_proto_config.changed

  handlers:
    - name: Load auditd rules
      ansible.builtin.command:
        cmd: augenrules --load
      changed_when: true

    - name: Restart journald
      ansible.builtin.systemd_service:
        name: systemd-journald
        state: restarted

- name: Apply nftables and SSH config
  hosts: raw, hosts
  tags:
    - never
    - side_effect
  gather_facts: false
  become: true

  tasks:
    - name: Restart SSH
      ansible.builtin.systemd_service:
        name: ssh
        state: restarted

    # It should still reuse the legacy SSH connection after restarting SSH
    - name: Reload nftables
      ansible.builtin.command:
        cmd: nft -f /etc/nftables.conf
      changed_when: true
