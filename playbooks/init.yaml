# Already-initialized hosts can still run this playbook, but without side_effect plays.
---
# Assume SSH and apt.
# Assume python3 in apt fits Ansible.
- name: Init newly-created hosts
  hosts: raw, hosts
  gather_facts: false
  become: true

  vars_files:
    - secrets.yaml

  pre_tasks:
    - name: Check password_hash
      ansible.builtin.assert:
        that:
          - password_hash is defined
        fail_msg: "Set password_hash in secrets.yaml"
        quiet: true

  tasks:
    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          echo "python3 present"
        else
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt
          echo "python3 installed"
        fi
      register: bootstrap_python
      changed_when: "'python3 installed' in bootstrap_python.stdout"

    - name: Gather facts
      ansible.builtin.setup:

    - name: Upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: "yes"

    - name: Install basic packages
      ansible.builtin.apt:
        name:
          - python3
          - sudo
          - build-essential
          - bash
          - neovim
          - git
          - nftables
          - htop
          - net-tools
          - dnsutils
          - ncdu
          - curl
          - wget
          - rsync
          - ca-certificates
          - cron
          - tmux
          - python3-debian # For deb822_repository module
        state: present

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname_short }}"

    - name: Update hosts for hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^(127\.0\.1\.1|{{ ansible_host | regex_escape }})\s+'
        line: "{{ ansible_host }} {{ inventory_hostname_short }}"

    - name: Update SSH config
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        insertbefore: BOF
        block: |
          PermitRootLogin no
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          Port 50000
          UseDNS no
        validate: /usr/sbin/sshd -t -f %s
      register: ssh_config

    - name: Comment old SSH config
      ansible.builtin.replace:
        path: /etc/ssh/sshd_config
        after: "# END ANSIBLE MANAGED BLOCK"
        regexp: '^(\s*{{ item }}[ \t=].*)$'
        replace: '# \1'
        validate: /usr/sbin/sshd -t -f %s
      loop:
        - PermitRootLogin
        - PasswordAuthentication
        - KbdInteractiveAuthentication
        - Port
        - UseDNS
      register: ssh_comment_old_config

    - name: Start and enable nftables
      ansible.builtin.systemd_service:
        name: nftables
        state: started
        enabled: true

    - name: Create nftables drop-in directory
      ansible.builtin.file:
        path: /etc/nftables.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Setup nftables
      ansible.builtin.copy:
        src: nftables.conf
        dest: /etc/nftables.conf
        owner: root
        group: root
        mode: "0644"
        validate: /usr/sbin/nft --check --file %s
      register: nftables_config

    - name: Add user
      ansible.builtin.user:
        name: "{{ username }}"
        state: present
        shell: /bin/bash
        create_home: true
        groups: sudo
        append: true
        password: "{{ password_hash }}"
        update_password: on_create

    - name: Check user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ username }}"
        fail_key: false
      changed_when: false

    - name: Allow user to run passwordless sudo
      ansible.builtin.copy:
        content: "{{ username }} ALL=(ALL:ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ username }}"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s

    - name: Setup user SSH
      ansible.posix.authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ lookup('ansible.builtin.file', 'secrets/ssh/id_ed25519.pub') }}"
      when: ansible_facts.getent_passwd[username] is not none

    # lynis HOME-9304
    - name: Restrict user home
      ansible.builtin.file:
        path: "/home/{{ username }}"
        state: directory
        mode: "0700"

  post_tasks:
    - name: Show SSH and nftables reload notice
      ansible.builtin.debug:
        msg: "SSH or nftables changed. Run the side-effect play with `--tags side_effect` after checking access so you do not lock yourself out of the server."
      when: >-
        ssh_config.changed
        or ssh_comment_old_config.changed
        or nftables_config.changed

    - name: Show nftables service rules notice
      ansible.builtin.debug:
        msg: "To reload nftables, handle rules added by existing services, e.g., Docker or Tailscale, with, e.g., restarting."
      when: >-
        'raw' not in group_names
        and nftables_config.changed

    - name: Show reboot notice
      ansible.builtin.debug:
        msg: "Reboot the host after applying this play because it is newly initialized and may have upgraded its kernel."
      when: "'raw' in group_names"

- name: Apply nftables and SSH config
  hosts: raw, hosts
  tags:
    - never
    - side_effect
  gather_facts: false
  become: true

  tasks:
    - name: Restart SSH
      ansible.builtin.systemd_service:
        name: ssh
        state: restarted

    # It should still reuse the legacy SSH connection after restarting SSH
    - name: Reload nftables
      ansible.builtin.command:
        cmd: nft -f /etc/nftables.conf
      changed_when: true
