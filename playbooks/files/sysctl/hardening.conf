# lynis KRNL-6000

# Forbid autoloading TTY line disciplines by unprivileged users
dev.tty.ldisc_autoload = 0

# Restrict FIFO creation in sticky world-writable directories
fs.protected_fifos = 2

# Hide kernel pointers in /proc
kernel.kptr_restrict = 2

# Disable magic SysRq keys, useless without a physical console
kernel.sysrq = 0

# Restrict ptrace to child processes
kernel.yama.ptrace_scope = 1

# Log packets with impossible source addresses.
# Rate-limited by net.core.message_cost and capped by the journald size limit.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Loose reverse path filtering: drop packets whose source is unroutable.
# Strict mode (1) breaks Tailscale and TUN-based proxies because their
# return paths are asymmetric. The effective value per interface is
# max(conf.all, conf.<interface>).
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Reject ICMP redirects and source-routed packets.
# net.ipv4.conf.all.accept_redirects and net.ipv4.conf.all.accept_source_route
# are already 0 by Debian defaults. The default.* keys cover new interfaces,
# e.g., Docker veths.
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
