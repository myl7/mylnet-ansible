# Managed by Ansible (mount-share.yaml).
#
# Widen systemd's start rate limit on this CIFS mount. The default is 5 starts
# per 10s. With dav and s3 driving nginx to stat /srv/share on every request, a
# backend outage makes the automount refire mount.cifs far faster than that, and
# each attempt fails instantly under the soft mount. Once the limit trips,
# systemd marks srv-share.automount failed and stops it, so the share never
# self-heals even after the backend returns.
#
# 25 starts per 30s absorbs a short blip well past the ~5-in-1s that tripped the
# default, while still capping a runaway retry loop. A longer or heavier outage
# can still trip it; the mylnet-share-watchdog.timer catches that case.
[Unit]
StartLimitIntervalSec=30
StartLimitBurst=25
