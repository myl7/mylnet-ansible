---
# Assume apt
- name: Setup nginx
  hosts: web
  become: true

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Check nginx is installed
      ansible.builtin.stat:
        path: /usr/sbin/nginx
      register: nginx_bin
      changed_when: false

    - name: Copy TLS certs and keys
      ansible.builtin.copy:
        src: ../secrets/tls/
        dest: /etc/nginx/tls/
        owner: root
        group: root
        mode: "0600"
        directory_mode: "0700"
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Copy nginx.conf
      ansible.builtin.copy:
        src: nginx/nginx.conf
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Create nginx service drop-in dir
      ansible.builtin.file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: nginx_bin.stat.exists

    - name: Copy nginx service hardening drop-in
      ansible.builtin.copy:
        src: systemd/hardening.conf
        dest: /etc/systemd/system/nginx.service.d/hardening.conf
        owner: root
        group: root
        mode: "0644"
      when: nginx_bin.stat.exists
      notify: Restart nginx

    - name: Copy dhparam
      ansible.builtin.copy:
        src: nginx/dhparam
        dest: /etc/nginx/dhparam
        owner: root
        group: root
        mode: "0644"
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Copy nginx snippets
      ansible.builtin.copy:
        src: nginx/snippets/
        dest: /etc/nginx/snippets/
        owner: root
        group: root
        mode: "0644"
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Copy ip site
      ansible.builtin.copy:
        src: nginx/sites-available/ip
        dest: /etc/nginx/sites-available/ip
        owner: root
        group: root
        mode: "0644"
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Enable ip site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/ip
        dest: /etc/nginx/sites-enabled/ip
        state: link
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Disable default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      when: nginx_bin.stat.exists
      notify: Reload nginx

    - name: Start and enable nginx
      ansible.builtin.systemd_service:
        name: nginx
        state: started
        enabled: true
      when: nginx_bin.stat.exists

  handlers:
    - name: Verify nginx service
      become: true
      ansible.builtin.command:
        cmd: systemd-analyze verify nginx.service
      changed_when: false
      listen: Restart nginx
      when: nginx_bin.stat.exists

    - name: Restart nginx
      become: true
      ansible.builtin.systemd_service:
        name: nginx
        state: restarted
        daemon_reload: true
      when: nginx_bin.stat.exists

    - name: Import nginx handlers
      ansible.builtin.import_tasks: handlers/nginx.yaml
